name: Build Windows EXE

# Build the Windows installer + portable .exe on a real Windows machine.
# Runs automatically on every push to main, and can be started manually from
# the GitHub "Actions" tab (Run workflow).
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        # Use `npm install` (not `npm ci`) so the correct platform-specific
        # native binaries for Rollup/esbuild are resolved on the Windows runner.
        # A lockfile generated on Linux omits the win32 binaries that `npm ci`
        # would require, which otherwise fails the Vite build.
        run: npm install --no-audit --no-fund

      - name: Build app bundles
        run: npm run build

      - name: Package Windows .exe (installer + portable)
        run: npx electron-builder --win --publish never

      - name: Upload .exe artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NexusPOS-Windows
          path: release/**/*.exe
          if-no-files-found: error
