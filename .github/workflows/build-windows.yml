name: Build Windows EXE

# Build the Windows portable .exe on a real Windows machine.
# Runs automatically on every push to main, and can be started manually from
# the GitHub "Actions" tab (Run workflow).
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        # `npm install` (not `npm ci`) so the correct platform-specific native
        # binaries for Rollup/esbuild are resolved on the Windows runner.
        run: npm install --no-audit --no-fund 2>&1 | tee install.log

      - name: Build app bundles
        run: npm run build 2>&1 | tee build.log

      - name: Package Windows .exe (portable)
        env:
          DEBUG: electron-builder
        run: npx electron-builder --win --publish never 2>&1 | tee package.log

      - name: Upload build logs (always, for debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            install.log
            build.log
            package.log
          if-no-files-found: warn

      - name: Upload .exe artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: NexusPOS-Windows
          path: release/**/*.exe
          if-no-files-found: error
